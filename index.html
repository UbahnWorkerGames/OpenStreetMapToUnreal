<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berlin U-Bahn</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f4f6;
        --panel: rgba(255, 255, 255, 0.94);
        --text: #111827;
        --muted: #6b7280;
        --border: rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #map {
        position: absolute;
        inset: 0;
      }

      .panel {
        position: absolute;
        z-index: 1000;
        top: 12px;
        left: 12px;
        max-width: min(320px, calc(100vw - 24px));
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--border);
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .layer-toggles {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px 10px;
        margin-top: 8px;
      }

      .export-box {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .toggle input {
        margin: 0;
      }

      .row label {
        font-size: 0.85rem;
        color: var(--muted);
      }

      select,
      input[type="search"] {
        font: inherit;
        font-size: 0.95rem;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        min-width: 5rem;
      }

      .range-select {
        min-width: 0;
        width: 7.4rem;
        font-size: 0.78rem;
        padding: 5px 7px;
      }

      #status {
        margin: 10px 0 0;
        font-size: 0.8rem;
        line-height: 1.4;
        color: var(--muted);
      }

      .btn-clear {
        font: inherit;
        font-size: 0.8rem;
        padding: 5px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        cursor: pointer;
      }

      .btn-clear:hover {
        background: #f9fafb;
      }

      .panel a {
        color: #2563eb;
        text-decoration: none;
      }

      .panel a:hover {
        text-decoration: underline;
      }

      #direction {
        margin: 8px 0 0;
        font-size: 0.8rem;
        line-height: 1.35;
        color: var(--text);
        font-weight: 500;
      }

      .leaflet-tooltip.station-tip {
        background: rgba(30, 41, 59, 0.92);
        color: #f1f5f9;
        border: none;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
        padding: 4px 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      }

      .leaflet-tooltip.station-tip::before {
        border-top-color: rgba(30, 41, 59, 0.92);
      }

      .btn-clear.active {
        background: #fce7f3;
        border-color: #f9a8d4;
        color: #be185d;
      }

      .edit-panel {
        position: absolute;
        z-index: 1000;
        bottom: 40px;
        left: 12px;
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border);
        min-width: 220px;
      }

      .edit-panel-name {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--text);
      }

      .edit-fields {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
      }

      .edit-fields label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .edit-fields input[type="number"] {
        width: 72px;
        font: inherit;
        font-size: 0.9rem;
        padding: 4px 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #fff;
      }

      .edit-handle {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #be185d;
        border: 3px solid #fff;
        cursor: move;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        transition: transform 0.15s;
      }

      .edit-handle:hover {
        transform: scale(1.3);
      }

      .spline-control {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3b82f6;
        border: 2px solid #fff;
        cursor: move;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.45);
        transition: transform 0.1s;
      }

      .spline-control:hover {
        background: #1d4ed8;
        transform: scale(1.5);
      }

      .code-modal {
        position: fixed;
        z-index: 2000;
        inset: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 24px;
        background: rgba(15, 23, 42, 0.55);
      }

      .code-modal[hidden] {
        display: none;
      }

      .code-modal-panel {
        display: flex;
        flex-direction: column;
        width: min(1100px, 100%);
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      }

      .code-modal-head,
      .code-modal-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      .code-modal-actions {
        justify-content: flex-end;
        border-top: 1px solid var(--border);
        border-bottom: none;
      }

      .code-modal-title {
        font-size: 0.95rem;
        font-weight: 600;
      }

      #python-code-output {
        flex: 1;
        min-height: 0;
        width: 100%;
        padding: 12px;
        border: 0;
        resize: none;
        font-family: "Cascadia Mono", "Consolas", monospace;
        font-size: 12px;
        line-height: 1.45;
        color: #0f172a;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Berlin · U-Bahn</h1>
      <div class="row" style="margin-top: 6px">
        <button type="button" class="btn-clear" id="btn-edit">✏ Bearbeiten</button>
        <button type="button" class="btn-clear" id="btn-spline">⟐ Spline</button>
        <button type="button" class="btn-clear" id="btn-fit" title="Gesamte Route anzeigen">⊕</button>
      </div>
      <div class="row" style="margin-top: 6px">
        <button type="button" class="btn-clear" id="btn-export-master" title="Master-JSON speichern (standalone, kein Overpass nötig)">💾 Master</button>
        <button type="button" class="btn-clear" id="btn-export-datatables" title="UE-Datatables als ZIP exportieren">DT ZIP</button>
        <button type="button" class="btn-clear" id="btn-export-pcg" title="UE/PCG Area-JSON speichern">PCG JSON</button>
        <button type="button" class="btn-clear" id="btn-export-area-python" title="Unreal-Python-Script fuer Bereichs-Splines speichern">UE Python</button>
        <button type="button" class="btn-clear" id="btn-load-edits" title="Master-JSON laden">📂 Laden</button>
        <button type="button" class="btn-clear" id="btn-reload" title="Aktuell geladene Datei neu einlesen">↻ Reload</button>
      </div>
      <div class="export-box">
        <div class="row">
          <label for="datatable-line-select">Export</label>
          <select id="datatable-line-select" aria-label="Datatable Export Linien">
            <option value="">erst Bereich laden</option>
          </select>
        </div>
        <div class="row" style="margin-top: 8px">
          <label for="segment-from">Teil</label>
          <select id="segment-from" class="range-select" aria-label="Teilbereich Start"></select>
          <span aria-hidden="true">bis</span>
          <select id="segment-to" class="range-select" aria-label="Teilbereich Ende"></select>
        </div>
      </div>
      <div class="row" style="margin-top: 10px">
        <button type="button" class="btn-clear" id="btn-area-select" title="Rechteck auf der Karte ziehen">Bereich</button>
        <button type="button" class="btn-clear" id="btn-area-load" title="Straßen, Schienen und U-Bahn-Linien im markierten Bereich laden">Bereich laden</button>
      </div>
      <div class="row" style="margin-top: 6px">
        <label for="postal-code-input">PLZ</label>
        <input id="postal-code-input" type="search" inputmode="numeric" autocomplete="postal-code" placeholder="10115" style="width: 6.5rem">
        <button type="button" class="btn-clear" id="btn-postal-code">Ort</button>
      </div>
      <div class="layer-toggles" aria-label="Bereichs-Layer">
        <label class="toggle"><input type="checkbox" data-area-layer="motorway"> Autobahn</label>
        <label class="toggle"><input type="checkbox" data-area-layer="major_road"> Hauptstrasse</label>
        <label class="toggle"><input type="checkbox" data-area-layer="city_road"> Stadtstrasse</label>
        <label class="toggle"><input type="checkbox" data-area-layer="service"> Service</label>
        <label class="toggle"><input type="checkbox" data-area-layer="rail_tram"> Tram</label>
        <label class="toggle"><input type="checkbox" data-area-layer="rail_train"> Zug</label>
        <label class="toggle"><input type="checkbox" data-area-layer="rail_subway" checked> U-Bahn</label>
      </div>
      <p id="direction" hidden></p>
      <p id="status"></p>
    </div>
    <div id="map" role="application" aria-label="Karte Berlin U-Bahn"></div>

    <div id="python-code-modal" class="code-modal" hidden>
      <div class="code-modal-panel" role="dialog" aria-modal="true" aria-labelledby="python-code-title">
        <div class="code-modal-head">
          <div id="python-code-title" class="code-modal-title">Unreal Python</div>
          <button type="button" class="btn-clear" id="btn-python-close">Schliessen</button>
        </div>
        <textarea id="python-code-output" spellcheck="false" aria-label="Unreal Python Code"></textarea>
        <div class="code-modal-actions">
          <button type="button" class="btn-clear" id="btn-python-copy">Copy</button>
          <button type="button" class="btn-clear" id="btn-python-download">Download</button>
        </div>
      </div>
    </div>

    <div id="edit-panel" class="edit-panel" hidden>
      <div id="edit-name" class="edit-panel-name"></div>
      <div class="edit-fields">
        <label>Länge <input id="edit-len" type="number" step="5" min="10"> m</label>
        <label>Breite <input id="edit-wid" type="number" step="0.5" min="1"> m</label>
      </div>
      <button type="button" class="btn-clear" id="edit-reset">Zurücksetzen</button>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
