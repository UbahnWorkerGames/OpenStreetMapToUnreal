<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berlin U-Bahn</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f4f6;
        --panel: rgba(255, 255, 255, 0.94);
        --text: #111827;
        --muted: #6b7280;
        --border: rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #map {
        position: absolute;
        inset: 0;
      }

      .panel {
        position: absolute;
        z-index: 1000;
        top: 12px;
        left: 12px;
        max-width: min(320px, calc(100vw - 24px));
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--border);
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .row label {
        font-size: 0.85rem;
        color: var(--muted);
      }

      select {
        font: inherit;
        font-size: 0.95rem;
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        min-width: 5rem;
      }

      #status {
        margin: 10px 0 0;
        font-size: 0.8rem;
        line-height: 1.4;
        color: var(--muted);
      }

      .btn-clear {
        font: inherit;
        font-size: 0.8rem;
        padding: 5px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        cursor: pointer;
      }

      .btn-clear:hover {
        background: #f9fafb;
      }

      .panel a {
        color: #2563eb;
        text-decoration: none;
      }

      .panel a:hover {
        text-decoration: underline;
      }

      #direction {
        margin: 8px 0 0;
        font-size: 0.8rem;
        line-height: 1.35;
        color: var(--text);
        font-weight: 500;
      }

      .leaflet-tooltip.station-tip {
        background: rgba(30, 41, 59, 0.92);
        color: #f1f5f9;
        border: none;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
        padding: 4px 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      }

      .leaflet-tooltip.station-tip::before {
        border-top-color: rgba(30, 41, 59, 0.92);
      }

      .btn-clear.active {
        background: #fce7f3;
        border-color: #f9a8d4;
        color: #be185d;
      }

      .edit-panel {
        position: absolute;
        z-index: 1000;
        bottom: 40px;
        left: 12px;
        padding: 14px 16px;
        border-radius: 10px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border);
        min-width: 220px;
      }

      .edit-panel-name {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--text);
      }

      .edit-fields {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
      }

      .edit-fields label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .edit-fields input[type="number"] {
        width: 72px;
        font: inherit;
        font-size: 0.9rem;
        padding: 4px 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #fff;
      }

      .edit-handle {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #be185d;
        border: 3px solid #fff;
        cursor: move;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        transition: transform 0.15s;
      }

      .edit-handle:hover {
        transform: scale(1.3);
      }

      .spline-control {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3b82f6;
        border: 2px solid #fff;
        cursor: move;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.45);
        transition: transform 0.1s;
      }

      .spline-control:hover {
        background: #1d4ed8;
        transform: scale(1.5);
      }

      /* ── Stations-Panel (rechts) ── */
      #station-panel {
        position: absolute;
        z-index: 1000;
        top: 12px;
        right: 12px;
        width: 220px;
        max-height: calc(100vh - 24px);
        display: flex;
        flex-direction: column;
        border-radius: 10px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--border);
        overflow: hidden;
      }

      #station-panel[hidden] { display: none; }

      #station-panel-header {
        padding: 10px 14px 8px;
        font-size: 0.85rem;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        color: var(--text);
      }

      #station-list {
        overflow-y: auto;
        flex: 1;
        padding: 4px 0;
      }

      .stn-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        cursor: pointer;
        transition: background 0.1s;
      }

      .stn-item:hover { background: rgba(0,0,0,0.04); }

      .stn-num {
        font-size: 0.7rem;
        color: var(--muted);
        min-width: 18px;
        text-align: right;
        flex-shrink: 0;
      }

      .stn-name {
        font-size: 0.82rem;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .stn-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #be185d;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Berlin · U-Bahn</h1>
      <div class="row">
        <label for="line-select">Linie</label>
        <select id="line-select" aria-label="U-Bahn-Linie"></select>
      </div>
      <div class="row" style="margin-top: 10px">
        <button type="button" class="btn-clear" id="btn-overpass" title="Aktuelle Linie direkt von Overpass laden">⇣ Overpass</button>
      </div>
      <div class="row" style="margin-top: 6px">
        <button type="button" class="btn-clear" id="btn-edit">✏ Bearbeiten</button>
        <button type="button" class="btn-clear" id="btn-spline">⟐ Spline</button>
        <button type="button" class="btn-clear" id="btn-fit" title="Gesamte Route anzeigen">⊕</button>
      </div>
      <div class="row" style="margin-top: 6px">
        <button type="button" class="btn-clear" id="btn-export-master" title="Master-JSON speichern (standalone, kein Overpass nötig)">💾 Master</button>
        <button type="button" class="btn-clear" id="btn-load-edits" title="Master-JSON laden">📂 Laden</button>
        <button type="button" class="btn-clear" id="btn-reload" title="Aktuell geladene Datei neu einlesen">↻ Reload</button>
      </div>
      <div class="row" style="margin-top: 6px">
        <button type="button" class="btn-clear" id="btn-export-ue" title="UE-Rail-JSON speichern">UE Export</button>
        <button type="button" class="btn-clear" id="btn-export-ue-all" title="Alle Linien als ZIP mit einzelnen UE-JSON-Dateien exportieren">UE ZIP</button>
      </div>
      <p id="direction" hidden></p>
      <p id="status"></p>
    </div>
    <div id="map" role="application" aria-label="Karte Berlin U-Bahn"></div>

    <div id="station-panel" hidden>
      <div id="station-panel-header"></div>
      <div id="station-list"></div>
    </div>

    <div id="edit-panel" class="edit-panel" hidden>
      <div id="edit-name" class="edit-panel-name"></div>
      <div class="edit-fields">
        <label>Länge <input id="edit-len" type="number" step="5" min="10"> m</label>
        <label>Breite <input id="edit-wid" type="number" step="0.5" min="1"> m</label>
      </div>
      <button type="button" class="btn-clear" id="edit-reset">Zurücksetzen</button>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
