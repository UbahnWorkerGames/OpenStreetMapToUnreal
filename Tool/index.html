<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>OSM to Unreal</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f4f6;
        --panel: rgba(255, 255, 255, 0.95);
        --text: #111827;
        --muted: #6b7280;
        --border: rgba(0, 0, 0, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #map {
        position: absolute;
        inset: 0;
      }

      .panel {
        position: absolute;
        z-index: 1000;
        top: 12px;
        left: 12px;
        max-width: min(340px, calc(100vw - 24px));
        padding: 14px 16px;
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--border);
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: 1.05rem;
        font-weight: 650;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .layer-toggles {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px 10px;
        margin-top: 10px;
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .toggle input {
        margin: 0;
      }

      input[type="search"] {
        font: inherit;
        font-size: 0.9rem;
        padding: 6px 9px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        width: 7rem;
      }

      .path-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 8px;
      }

      .path-field label {
        font-size: 0.75rem;
        color: var(--muted);
      }

      .path-field input {
        width: 100%;
        min-width: 0;
        font: inherit;
        font-size: 0.78rem;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
      }

      #status {
        margin: 10px 0 0;
        font-size: 0.8rem;
        line-height: 1.4;
        color: var(--muted);
      }

      .btn-clear {
        font: inherit;
        font-size: 0.8rem;
        padding: 5px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        cursor: pointer;
      }

      .btn-clear:hover {
        background: #f9fafb;
      }

      .btn-clear.active {
        background: #dcfce7;
        border-color: #86efac;
        color: #166534;
      }

      .code-modal {
        position: fixed;
        z-index: 2000;
        inset: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 24px;
        background: rgba(15, 23, 42, 0.55);
      }

      .code-modal[hidden] {
        display: none;
      }

      .code-modal-panel {
        display: flex;
        flex-direction: column;
        width: min(1100px, 100%);
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      }

      .code-modal-head,
      .code-modal-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      .code-modal-actions {
        justify-content: flex-end;
        border-top: 1px solid var(--border);
        border-bottom: none;
      }

      .code-modal-title {
        font-size: 0.95rem;
        font-weight: 650;
      }

      #python-code-output {
        flex: 1;
        min-height: 0;
        width: 100%;
        padding: 12px;
        border: 0;
        resize: none;
        font-family: "Cascadia Mono", "Consolas", monospace;
        font-size: 12px;
        line-height: 1.45;
        color: #0f172a;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>OSM to Unreal</h1>
      <div class="path-field">
        <label for="street-bp-path-input">Street Path BP</label>
        <input id="street-bp-path-input" type="text" spellcheck="false" autocomplete="off" />
      </div>
      <div class="path-field">
        <label for="building-bp-path-input">Building Cube BP</label>
        <input id="building-bp-path-input" type="text" spellcheck="false" autocomplete="off" />
      </div>
      <div class="row">
        <button type="button" class="btn-clear" id="btn-area-select" title="Rechteck auf der Karte ziehen">Bereich</button>
        <button type="button" class="btn-clear" id="btn-area-load" title="OSM-Daten im gewaehlten Bereich von Overpass laden">Overpass laden</button>
      </div>
      <div class="row">
        <button type="button" class="btn-clear" id="btn-export-area-python" title="Unreal-Python-Code anzeigen">UE Python</button>
      </div>
      <div class="row">
        <input id="postal-code-input" type="search" inputmode="numeric" autocomplete="postal-code" placeholder="10115" />
        <button type="button" class="btn-clear" id="btn-postal-code">Ort</button>
      </div>
      <div class="layer-toggles" aria-label="OSM-Layer">
        <label class="toggle"><input type="checkbox" data-area-layer="motorway"> Autobahn</label>
        <label class="toggle"><input type="checkbox" data-area-layer="major_road" checked> Hauptstrasse</label>
        <label class="toggle"><input type="checkbox" data-area-layer="city_road"> Stadtstrasse</label>
        <label class="toggle"><input type="checkbox" data-area-layer="service"> Service</label>
        <label class="toggle"><input type="checkbox" data-area-layer="rail_tram"> Tram</label>
        <label class="toggle"><input type="checkbox" data-area-layer="rail_train"> Zug</label>
        <label class="toggle"><input type="checkbox" data-area-layer="rail_subway"> Subway</label>
        <label class="toggle"><input type="checkbox" data-area-layer="building"> Gebaeude</label>
        <label class="toggle"><input type="checkbox" data-area-layer="traffic_sign"> Verkehrsschild</label>
        <label class="toggle"><input type="checkbox" data-area-layer="traffic_signal"> Ampel</label>
        <label class="toggle"><input type="checkbox" data-area-layer="sports_field"> Sportplatz</label>
        <label class="toggle"><input type="checkbox" data-area-layer="water"> Wasser</label>
      </div>
      <p id="status"></p>
    </div>

    <div id="map" role="application" aria-label="OSM export map"></div>

    <div id="python-code-modal" class="code-modal" hidden>
      <div class="code-modal-panel" role="dialog" aria-modal="true" aria-labelledby="python-code-title">
        <div class="code-modal-head">
          <div id="python-code-title" class="code-modal-title">Unreal Python</div>
          <button type="button" class="btn-clear" id="btn-python-close">Schliessen</button>
        </div>
        <textarea id="python-code-output" spellcheck="false" aria-label="Unreal Python Code"></textarea>
        <div class="code-modal-actions">
          <button type="button" class="btn-clear" id="btn-python-copy">Copy</button>
          <button type="button" class="btn-clear" id="btn-python-download">Download</button>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="/main.js?v=20260526-cache-bust"></script>
  </body>
</html>
